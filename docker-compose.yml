version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sprints_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sprints
      POSTGRES_PASSWORD: sprints
      POSTGRES_DB: sprints
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sprints_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --save 60 1

volumes:
  postgres_data:
